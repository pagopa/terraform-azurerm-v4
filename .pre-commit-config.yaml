repos:
  - repo: local
    hooks:
      - id: generate-idh-docs
        name: Generate IDH Docs
        entry: .scripts/generate-idh-docs.sh
        language: python
        types: [python]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
  - repo: https://github.com/mcole18/terraform-check-unused-variables.git
    rev: v1.2.1
    hooks:
      - id: check-unused-vars
        args: [ -r, -q, --dir=., --var-file=variables.tf ]
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_docs
        args:
          - --args=--hide providers
      #validate will exclude folders that contains xyz/test... and .utils that contains only scripts stuffs
      - id: terraform_validate
        exclude: '(.*\/tests|.utils)'
        args:
          - --args=-json
          - --args=-no-color

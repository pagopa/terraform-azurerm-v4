redis_managed:
  dev:
    small:
      resource_group_name: "rg-dev"
      location: "eastus"
      sku_name: "Enterprise_E10"
      family: "Enterprise"
      capacity: 1
      redis_version: "7"
      zones: ["1"]
      enable_public_network_access: true
      enable_authentication: true
      minimum_tls_version: "1.2"
      shard_count: 1
      # Alerting disabled in dev
      action_group_enabled: false

  test:
    small:
      resource_group_name: "rg-test"
      location: "eastus"
      sku_name: "Enterprise_E20"
      family: "Enterprise"
      capacity: 1
      redis_version: "7"
      zones: ["1", "2"]
      enable_public_network_access: false
      enable_authentication: true
      minimum_tls_version: "1.2"
      shard_count: 1
      # Basic alerting in test
      action_group_enabled: true
      alert_email_receivers:
        - "devops-team@company.com"
      alert_high_cpu_threshold: 85
      alert_high_memory_threshold: 85
      alert_eviction_threshold: 200
      alert_connection_failures_threshold: 20

    medium:
      resource_group_name: "rg-test"
      location: "eastus"
      sku_name: "Enterprise_E50"
      family: "Enterprise"
      capacity: 2
      redis_version: "7"
      zones: ["1", "2", "3"]
      enable_public_network_access: false
      enable_authentication: true
      minimum_tls_version: "1.2"
      shard_count: 2
      # Alerting with private endpoint in test
      action_group_enabled: true
      alert_email_receivers:
        - "devops-team@company.com"
      alert_high_cpu_threshold: 80
      alert_high_memory_threshold: 80
      alert_eviction_threshold: 150
      alert_connection_failures_threshold: 15

  prod:
    medium:
      resource_group_name: "rg-prod"
      location: "eastus"
      sku_name: "Enterprise_E50"
      family: "Enterprise"
      capacity: 2
      redis_version: "7"
      zones: ["1", "2", "3"]
      enable_public_network_access: false
      enable_authentication: true
      minimum_tls_version: "1.2"
      shard_count: 2
      # Full monitoring in prod with private endpoint
      action_group_enabled: true
      alert_email_receivers:
        - "devops-team@company.com"
        - "alerts@company.com"
      alert_high_cpu_threshold: 70
      alert_high_memory_threshold: 75
      alert_eviction_threshold: 100
      alert_connection_failures_threshold: 10

    large:
      resource_group_name: "rg-prod"
      location: "eastus"
      sku_name: "Enterprise_E100"
      family: "Enterprise"
      capacity: 3
      redis_version: "7"
      zones: ["1", "2", "3"]
      enable_public_network_access: false
      enable_authentication: true
      minimum_tls_version: "1.2"
      shard_count: 4
      # Strict alerting for large prod cache
      action_group_enabled: true
      alert_email_receivers:
        - "devops-team@company.com"
        - "alerts@company.com"
        - "on-call@company.com"
      alert_high_cpu_threshold: 65
      alert_high_memory_threshold: 70
      alert_eviction_threshold: 75
      alert_connection_failures_threshold: 8

    xlarge:
      resource_group_name: "rg-prod"
      location: "eastus"
      sku_name: "Enterprise_E100"
      family: "Enterprise"
      capacity: 5
      redis_version: "7"
      zones: ["1", "2", "3"]
      enable_public_network_access: false
      enable_authentication: true
      minimum_tls_version: "1.2"
      shard_count: 8
      # Most aggressive alerting for critical xlarge cache
      action_group_enabled: true
      alert_email_receivers:
        - "devops-team@company.com"
        - "alerts@company.com"
        - "on-call@company.com"
        - "platform-lead@company.com"
      alert_high_cpu_threshold: 60
      alert_high_memory_threshold: 65
      alert_eviction_threshold: 50
      alert_connection_failures_threshold: 5

# Redis Managed - UAT Environment Configuration
# Production-like configurations for user acceptance testing

basic:
  sku_name: Standard
  family: C
  capacity: 1
  redis_version: "6"
  enable_non_ssl_port: false
  minimum_tls_version: "1.2"
  shard_count: null
  subnet_id: null
  private_static_ip_address: null
  public_network_access_enabled: false
  custom_zones: [1, 2, 3]
  enable_authentication: true
  maxmemory_policy: "allkeys-lru"


name: 🛃 Static Analysis PR

permissions:
  contents: read
on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  static_analysis:
    runs-on: ubuntu-latest

    steps:
      - run: |
          rm -rf *

      - name: 🔨 Get Modified Paths
        id: get-paths
        uses: pagopa/eng-github-actions-iac-template/global/get-modifed-folders@f10814b649ecd6e5d97c489084d2a107e2f1b2ee #1.22.3
        with:
          start_folder: "/"
          include_patterns: "/"
          ignore_patterns: ".github,.devops,.vscode,.gitignore,.terraform-version"
          include_folders: ".scripts,.utils,IDH,subnet,network_security_group,app_service,kubernetes_cluster_node_pool,app_service_slot,function_app,function_app_slot,key_vault,eventhub,cosmosdb_account,redis_cache,postgres_flexible_server,postgres_flexible_server_replica,storage_account,log_analytics_workspace,managed_redis"
          stopper_folders: "env,tests,docs,helm,packer,logs-generic,yaml,dashboard,dashboards,templates,rules"

      - name: 👀 See folders downloaded
        if: env.dir_changes_detected == 'true'
        id: see
        shell: bash
        run: |
          python3 -V
          tree -R -d -a .

      - name: run_init
        if: env.dir_changes_detected == 'true'
        run: |
          bash .utils/terraform_run_all.sh init docker

      - name: show_version
        if: env.dir_changes_detected == 'true'
        run: |
          TAG="v1.105.0@sha256:4ef4b8323b27fc263535ad88c9d2f20488fcb3b520258e5e7f0553ed5f6692b5"
          docker run --rm --entrypoint cat ghcr.io/antonbabenko/pre-commit-terraform:$TAG /usr/bin/tools_versions_info

      - name: run_test
        if: env.dir_changes_detected == 'true'
        run: |
          TAG="v1.105.0@sha256:4ef4b8323b27fc263535ad88c9d2f20488fcb3b520258e5e7f0553ed5f6692b5"
          docker run -v $(pwd):/lint -w /lint ghcr.io/antonbabenko/pre-commit-terraform:$TAG run -a
